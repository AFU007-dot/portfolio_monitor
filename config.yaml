# ============================================================
# Portfolio Monitor Configuration
# ============================================================
# ADVISORY ONLY. Never places orders.
# ============================================================

portfolio:
  csv_path: "portfolio.csv"

# ------------------------------------------------------------
# Portfolio-position signals (applied to every ticker in the CSV)
# ------------------------------------------------------------
signals:
  bearish_streak_length: 2       # N consecutive bearish daily closes (each must close lower than previous)
  daily_drop_pct: 10.0           # 10% daily drop (intraday + EOD, vs today's open)
  ma_period: 50                  # Break below N-day moving average
  ma_confirmation_pct: 1.0
  history_days: 380              # ~52 weeks of trading days + buffer for holidays
  check_intraday: true

# ------------------------------------------------------------
# Always-watched market indices — evaluated on EVERY run,
# independent of portfolio.csv. Each ticker has its own rule set.
# ------------------------------------------------------------
index_watchlist:
  enabled: true
  common:
    ma_period: 50                # N-day moving average for all indices
    bearish_streak_length: 2     # N consecutive bearish daily closes (each must close lower than previous)
    intraday_drop_pct: 2.0       # -2% from today's open (intraday + EOD)

  # Per-ticker overrides. Each entry:
  #   surge_thresholds_pct: list of tiered "above MA" thresholds (highest hit is reported)
  tickers:
    - symbol: "^GSPC"
      label: "S&P 500"
      surge_thresholds_pct: [9.0]

    - symbol: "^IXIC"
      label: "Nasdaq Composite"
      surge_thresholds_pct: [9.0]

    - symbol: "SMH"
      label: "Semiconductor ETF (SMH)"
      surge_thresholds_pct: [10.0, 15.0, 20.0]

# ------------------------------------------------------------
# Fibonacci retracement (context only — does not trigger alerts)
# ------------------------------------------------------------
fibonacci:
  enabled: true
  lookback_trading_days: 252         # ~52 weeks
  levels_pct: [0.0, 23.6, 38.2, 50.0, 61.8, 78.6, 100.0]
  at_level_proximity_pct: 0.5        # "At a Fib level" if within 0.5% of any level

data:
  source: "yfinance"
  request_timeout_seconds: 20
  max_retries: 3
  retry_backoff_seconds: 2

alerts:
  github_issues:
    enabled: true
    labels: ["portfolio-alert", "auto-generated"]
    dedupe_by_signal: true
  log_file: "signals.log"
